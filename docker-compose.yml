services:
  mysql:
    image: mysql:8.0
    container_name: investalert-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: investalert
      MYSQL_USER: investalert
      MYSQL_PASSWORD: investalert123
    ports:
      - "3307:3306"
    volumes:
      - investalert_mysql_data:/var/lib/mysql
    networks:
      - investalert-network

volumes:
  investalert_mysql_data:

networks:
  investalert-network:
    driver: bridge