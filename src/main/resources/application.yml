spring:
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3307/investalert?useSSL=false&serverTimezone=America/Fortaleza&allowPublicKeyRetrieval=true
    username: investalert
    password: investalert123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-migration-naming: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: investalert-secret-key-dev-must-be-at-least-256-bits-long-for-hmac
  expiration: 86400000

integration:
  brapi:
    base-url: https://brapi.dev/api
  coingecko:
    base-url: https://api.coingecko.com/api/v3

scheduler:
  preco:
    intervalo: 300000
  alerta:
    intervalo: 300000
    delay: 30000

server:
  port: 8080

logging:
  level:
    com.investalert: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

integration:
  brapi:
    base-url: https://brapi.dev/api
  coingecko:
    base-url: https://api.coingecko.com/api/v3

scheduler:
  preco:
    intervalo: 300000
  alerta:
    intervalo: 300000
    delay: 30000

server:
  port: ${PORT:8080}

logging:
  level:
    com.investalert: INFO